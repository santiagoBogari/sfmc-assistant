<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SFMC Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0f1117;
      color: #e6edf3;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #238636;
      box-shadow: 0 0 8px #238636;
    }
    .header h1 { font-size: 16px; font-weight: 600; color: #e6edf3; }
    .header span { font-size: 12px; color: #8b949e; margin-left: 4px; }
    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
    }
    .message { display: flex; gap: 12px; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .message.user { flex-direction: row-reverse; }
    .avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 600;
      flex-shrink: 0;
    }
    .avatar.user-av { background: #1f6feb; color: #fff; }
    .avatar.bot-av  { background: #238636; color: #fff; }
    .bubble {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
    }
    .message.user .bubble {
      background: #1f6feb;
      color: #fff;
      border-radius: 12px 4px 12px 12px;
    }
    .message.bot .bubble {
      background: #161b22;
      color: #e6edf3;
      border: 1px solid #30363d;
      border-radius: 4px 12px 12px 12px;
    }
    .typing { display: flex; gap: 4px; align-items: center; padding: 14px 16px; }
    .typing span {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #8b949e;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%           { transform: translateY(-6px); }
    }
    .input-area {
      background: #161b22;
      border-top: 1px solid #30363d;
      padding: 16px 24px;
    }
    .input-row {
      max-width: 800px;
      margin: 0 auto;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    textarea {
      flex: 1;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 12px 14px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: #e6edf3;
      resize: none;
      outline: none;
      min-height: 48px;
      max-height: 120px;
      line-height: 1.5;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: #1f6feb; }
    textarea::placeholder { color: #484f58; }
    button {
      width: 48px; height: 48px;
      border-radius: 10px;
      background: #1f6feb;
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, transform 0.1s;
      flex-shrink: 0;
    }
    button:hover  { background: #388bfd; }
    button:active { transform: scale(0.95); }
    button:disabled { background: #30363d; cursor: not-allowed; }
    button svg { width: 18px; height: 18px; fill: #fff; }
    .welcome { text-align: center; padding: 48px 24px; color: #8b949e; }
    .welcome h2 { font-size: 22px; font-weight: 600; color: #e6edf3; margin-bottom: 8px; }
    .welcome p { font-size: 14px; line-height: 1.6; }
    .suggestions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 20px; }
    .suggestion {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 20px;
      padding: 8px 14px;
      font-size: 12px;
      color: #8b949e;
      cursor: pointer;
      transition: all 0.2s;
    }
    .suggestion:hover { border-color: #1f6feb; color: #e6edf3; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-dot"></div>
  <h1>SFMC Assistant <span>powered by Claude</span></h1>
</div>

<div class="chat-container" id="chat">
  <div class="welcome" id="welcome">
    <h2>¡Hola, Santiago! 👋</h2>
    <p>Soy tu asistente experto en Salesforce Marketing Cloud.<br>Pregúntame lo que necesites.</p>
    <div class="suggestions">
      <div class="suggestion" onclick="sendSuggestion(this)">¿Qué es AMPscript?</div>
      <div class="suggestion" onclick="sendSuggestion(this)">Cómo crear un Journey</div>
      <div class="suggestion" onclick="sendSuggestion(this)">SQL para Data Views</div>
      <div class="suggestion" onclick="sendSuggestion(this)">InsertDE vs UpsertDE</div>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-row">
    <textarea
      id="input"
      placeholder="Pregunta algo sobre SFMC..."
      rows="1"
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"
    ></textarea>
    <button id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
    </button>
  </div>
</div>

<script>
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function removeWelcome() {
  const w = document.getElementById('welcome');
  if (w) w.remove();
}

function addMessage(text, role) {
  removeWelcome();
  const div = document.createElement('div');
  div.className = `message ${role}`;
  const initial = role === 'user' ? 'S' : 'AI';
  const avClass = role === 'user' ? 'user-av' : 'bot-av';
  div.innerHTML = `
    <div class="avatar ${avClass}">${initial}</div>
    <div class="bubble">${text}</div>
  `;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function addTyping() {
  removeWelcome();
  const div = document.createElement('div');
  div.className = 'message bot';
  div.id = 'typing';
  div.innerHTML = `
    <div class="avatar bot-av">AI</div>
    <div class="bubble typing">
      <span></span><span></span><span></span>
    </div>
  `;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text) return;

  addMessage(text, 'user');
  input.value = '';
  input.style.height = 'auto';
  sendBtn.disabled = true;
  addTyping();

  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text })
    });
    const data = await res.json();
    removeTyping();
    addMessage(data.response, 'bot');
  } catch (err) {
    removeTyping();
    addMessage('Error conectando con el servidor. Verifica que app.py está corriendo.', 'bot');
  }

  sendBtn.disabled = false;
  input.focus();
}

function sendSuggestion(el) {
  input.value = el.textContent;
  sendMessage();
}
</script>

</body>
</html>
